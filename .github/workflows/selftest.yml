# Self-test: prove the installer + template produce a working, gate-green
# project on every change. This matrix IS the release acceptance test.
name: selftest

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selftest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: node scripts/check-syntax.mjs
      - run: node scripts/hygiene.mjs
      - run: node --test "tests/installer/*.test.mjs"

  hook-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: node --test "tests/hooks/*.test.mjs"

  bootstrap:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    env:
      # Placeholder public env so `next build` succeeds without a live project.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Bootstrap a fresh project from the template
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/boot" --yes \
            --set PROJECT_NAME="Selftest App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      - name: Enable corepack + install
        working-directory: ${{ runner.temp }}/boot
        run: |
          git init -b main   # lefthook's prepare script needs a git repo
          corepack enable
          corepack prepare --activate
          pnpm install --no-frozen-lockfile
      - name: THE GATE — pnpm validate must be green out of the box
        working-directory: ${{ runner.temp }}/boot
        run: pnpm validate
      - name: Unit tests green (Stop-hook step 3)
        working-directory: ${{ runner.temp }}/boot
        run: pnpm vitest run --silent
      - name: RLS suite FAILS CLOSED in CI when migrations exist without a stack
        working-directory: ${{ runner.temp }}/boot
        run: |
          # Doctrine test: with migrations present and no Supabase stack, a CI
          # skip would be a false green — run-rls.mjs must exit nonzero.
          # (Locally, without CI=true, the same state self-skips green.)
          if pnpm test:rls > rls.log 2>&1; then
            echo 'expected fail-closed, got green' >&2; cat rls.log; exit 1
          fi
          grep -q 'failing closed' rls.log

  retrofit:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Synthesize an existing project with planted conflicts
        run: |
          mkdir -p "$RUNNER_TEMP/retro/app"
          cat > "$RUNNER_TEMP/retro/package.json" <<'EOF'
          {"name":"existing","dependencies":{"next":"16.1.0"},"scripts":{"validate":"my-own-gate"}}
          EOF
          echo 'export default []' > "$RUNNER_TEMP/retro/eslint.config.mjs"
          echo 'export default function P(){return null}' > "$RUNNER_TEMP/retro/app/page.tsx"
      - name: Retrofit install (JSON report)
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/retro" --yes --report json \
            --set PROJECT_NAME="Retro App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner > "$RUNNER_TEMP/report.json" || true
      - name: Assert non-clobber semantics
        run: |
          node - "$RUNNER_TEMP" <<'EOF'
          const fs = require('node:fs')
          const [tmp] = process.argv.slice(2)
          const report = JSON.parse(fs.readFileSync(`${tmp}/report.json`, 'utf8'))
          const pkg = JSON.parse(fs.readFileSync(`${tmp}/retro/package.json`, 'utf8'))
          if (pkg.scripts.validate !== 'my-own-gate') throw new Error('clobbered validate script')
          if (pkg.scripts['harness:validate'] !== 'node tools/validate.mjs') throw new Error('missing harness:validate')
          if (fs.readFileSync(`${tmp}/retro/eslint.config.mjs`, 'utf8') !== 'export default []\n') throw new Error('clobbered eslint config')
          if (!fs.existsSync(`${tmp}/retro/eslint.config.harness.mjs`)) throw new Error('missing harness eslint sibling')
          if (!report.conflicts?.length) throw new Error('conflict report empty')
          if (fs.existsSync(`${tmp}/retro/app/protected`)) throw new Error('stack app code installed on retrofit')
          console.log('retrofit non-clobber: OK')
          EOF

  runtime:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-set-after-start
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest
      - name: Bootstrap fixture
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/rt" --yes \
            --set PROJECT_NAME="Runtime App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      - name: Start local Supabase stack
        working-directory: ${{ runner.temp }}/rt
        run: supabase start
      - name: Install deps
        working-directory: ${{ runner.temp }}/rt
        run: |
          git init -b main   # lefthook's prepare script needs a git repo
          corepack enable
          corepack prepare --activate
          pnpm install --no-frozen-lockfile
      - name: RLS isolation suite must actually run (not skip)
        working-directory: ${{ runner.temp }}/rt
        run: |
          set -o pipefail
          eval "$(supabase status -o env | grep -E 'SERVICE_ROLE_KEY|ANON_KEY|API_URL')"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          # Positive proof it ran for real (not the pre-schema self-skip): with migrations +
          # a reachable stack the runner takes the pgTAP branch ('running pgTAP checks') and
          # ends '[rls] OK' only if the SDK isolation suite also passed. Assert both.
          pnpm test:rls 2>&1 | tee rls.log
          grep -q 'running pgTAP checks' rls.log \
            || { echo 'RLS suite self-skipped instead of running against the live stack' >&2; exit 1; }
          grep -q '\[rls\] OK' rls.log \
            || { echo 'RLS suite did not complete green' >&2; exit 1; }
      - name: Types-drift gate the installed project's CI runs
        working-directory: ${{ runner.temp }}/rt
        run: pnpm check:types:drift
      - name: Migration apply-integrity
        working-directory: ${{ runner.temp }}/rt
        run: pnpm test:migrations
