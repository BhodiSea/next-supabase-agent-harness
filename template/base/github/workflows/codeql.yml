# CodeQL SAST — diff-aware on PR, full nightly. Results upload to the Security tab (SARIF).
# Private repos require GitHub Advanced Security for SARIF upload; the analysis itself still runs.
# SOURCE: docs/harness/README.md (SAST as part of the security-testing layer)
name: codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Full nightly scan. 03:23 UTC.
    - cron: "23 3 * * *"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:javascript-typescript"
