# OSV-Scanner SCA — known-vulnerability scan of lockfiles against the OSV database.
# The PR job is diff-aware (fails only on NEWLY introduced vulns); the scheduled job
# scans the full tree weekly. These are Google's official reusable workflows: they are
# pinned by TAG, not SHA (a bare-SHA ref on a reusable workflow loses the readable
# version marker); Renovate's pinGitHubActionDigests/pin management keeps it current.
# SOURCE: docs/harness/README.md (supply-chain scanning)
name: osv-scan

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    # Weekly full scan. Monday 03:47 UTC.
    - cron: "47 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    name: osv (PR diff)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9bb69575e74019c2ad085a1860787043adf47ccb # v2.2.4
    permissions:
      actions: read
      contents: read
      security-events: write

  scan-full:
    name: osv (full tree)
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9bb69575e74019c2ad085a1860787043adf47ccb # v2.2.4
    permissions:
      actions: read
      contents: read
      security-events: write
