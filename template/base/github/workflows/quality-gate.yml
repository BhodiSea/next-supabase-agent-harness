# CI merge gate. pnpm + Corepack. The static job runs the SAME validate chain the local
# Stop hook enforces (tools/validate.mjs), so a CI pass and a local pass mean the same
# thing. Runtime test jobs self-skip their DB layer until supabase/migrations exist.
# SOURCE: docs/harness/README.md (CI merge gate)
name: quality-gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static (validate floor)
    runs-on: ubuntu-latest
    # Placeholder public env so `next build` (inside the validate chain) renders without a
    # real backend; static checks and the build need no live Supabase.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack (pins pnpm from package.json#packageManager)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # One entrypoint for the whole static floor (biome + tsc + eslint + provenance check +
      # dependency-cruiser + knip + repo gates + next build) — the same script the local
      # Stop hook runs, so CI cannot drift from the agent harness.
      # SOURCE: docs/harness/README.md (single validate entrypoint)
      - name: Validate (min floor)
        run: node tools/validate.mjs --min-floor

  # ---------------------------------------------------------------------------
  # Unit + contract tests — Vitest (node env, no DB stack). Fast, per-PR.
  # SOURCE: docs/harness/README.md (Vitest unit layer; typed schema contracts)
  # ---------------------------------------------------------------------------
  unit:
    name: unit + contract (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit + contract tests
        run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Runtime gates — RLS tenant isolation + a11y. Runs CONCURRENTLY with static
  # (no `needs: static`). The RLS suite self-skips its DB layer until a stack +
  # supabase/migrations exist; mutation testing lives in a separate module workflow.
  # SOURCE: docs/harness/README.md (runtime job)
  # ---------------------------------------------------------------------------
  runtime:
    name: runtime (rls + a11y)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Start a local Supabase stack ONLY when migrations exist; otherwise the RLS
      # suite self-skips its DB layer and the stack would be pointless overhead.
      - name: Install Supabase CLI
        if: hashFiles('supabase/migrations/**') != ''
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest

      - name: Start local Supabase stack
        if: hashFiles('supabase/migrations/**') != ''
        run: supabase start

      # Generated-types drift: regenerate from the live schema and compare to the committed file.
      - name: Generated-types drift (gen vs committed)
        if: hashFiles('supabase/migrations/**') != ''
        run: pnpm check:types:drift

      # Migration apply integrity: every migration must apply cleanly from a clean database.
      - name: Migration apply integrity (db reset from clean)
        if: hashFiles('supabase/migrations/**') != ''
        run: pnpm test:migrations

      - name: RLS tenant isolation (fail-closed; self-skips pre-schema)
        run: pnpm test:rls

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Accessibility (Playwright + axe-core, WCAG 2.2 AA)
        run: pnpm test:a11y
