# pnpm 11 supply-chain settings.
# SOURCE: docs/harness/README.md (supply-chain hardening)
packages:
  - '.'

# Cooldown before newly-published package versions may be installed,
# in minutes: 4320 minutes = 3 days (rides out most compromised-release windows).
minimumReleaseAge: 4320

# Lifecycle build scripts are blocked by default (pnpm 11); every allowed build
# is an explicit, reviewed decision. sharp + unrs-resolver are Next.js's own
# native helpers (image optimization, module resolution).
allowBuilds:
  lefthook: true
  '@biomejs/biome': true
  sharp: true
  unrs-resolver: true
