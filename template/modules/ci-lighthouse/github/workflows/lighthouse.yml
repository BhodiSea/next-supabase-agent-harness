# Lighthouse CI — lab performance + a11y budgets enforced on PR. Builds the app, starts it,
# and runs lhci against the PUBLIC routes listed in lighthouserc.json (auth-gated routes
# can't be lab-tested in CI; cover authed surfaces with field RUM / web-vitals beacons).
# Error-level assertions fail the job; TBT/FCP/JS-byte budgets are warn (lab != production
# edge; localhost transfer size is not gzip-accurate).
# SOURCE: docs/harness/README.md (CWV budgets, two tiers)
name: lighthouse

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: lighthouse-ci (budgets)
    runs-on: ubuntu-latest
    # Placeholder public env so `next build` + the public shell render without a real backend;
    # the audited routes are public and need no live Supabase.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lighthouse CI (autorun against lighthouserc.json)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true
