# Mutation testing — StrykerJS. The full run is SLOW: nightly cron + manual dispatch only,
# never a per-PR gate. The per-PR job runs Stryker INCREMENTALLY on the critical modules and
# is ADVISORY (continue-on-error) until a measured run confirms >=80% mutation score — then
# remove continue-on-error to make it blocking.
# SOURCE: docs/harness/README.md (mutation gate; >=80% on critical modules, incremental per-PR)
name: mutation

on:
  pull_request:
  schedule:
    # Nightly full run. 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Full-library net: every mutant, every module. Nightly/manual only.
  # ---------------------------------------------------------------------------
  mutation-full:
    name: mutation (stryker — nightly full)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mutation testing (StrykerJS, full)
        run: pnpm test:mutation

  # ---------------------------------------------------------------------------
  # Per-PR incremental mutation on the CRITICAL modules only (money maths, de-identification,
  # anything whose silent breakage is expensive). ADVISORY: continue-on-error until a measured
  # run confirms >=80% — then remove continue-on-error to make it blocking. The nightly
  # mutation-full job above stays as the whole-library net.
  # SOURCE: docs/harness/README.md (mutation >=80% on critical modules; incremental on changed files)
  # ---------------------------------------------------------------------------
  mutation-incremental:
    name: mutation-incremental (critical modules — advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so Stryker's incremental diff can resolve the base.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Incremental mutation (critical modules, break >=80)
        run: pnpm test:mutation:inc
